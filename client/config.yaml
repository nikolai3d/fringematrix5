# Client Application Configuration
# Edit this file to customize app behavior without modifying code

loadingScreen:
  # Type of loading screen: 'legacy', 'terminal', or 'glyphs'
  type: glyphs

  # Delay (ms) before auto-fading to main content after data is ready
  autoFadeDelayMs: 300

theme:
  # Primary accent color used throughout the UI
  # This is the "Fringe blue" cyan color derived from the Fringe glyph images
  # Format: CSS hex color (e.g., "#00D4FF")
  accentColor: "#00D4FF"

site:
  # Canonical production URL used for share links (e.g. Threads)
  url: "https://fringematrix.art"
  # Default text prepended to share links
  shareText: "Check out Fringe Matrix"

lightbox:
  # Panel enter/exit animation for all lightbox panels (image frame, sidebar,
  # nav toolbar). On open each panel expands from a thin blinking horizontal
  # line into the full panel; on close it collapses back to a line and fades
  # out. All timings are in milliseconds.
  #
  # When reduce-effects is active (in-app toggle or prefers-reduced-motion),
  # these timings are ignored and the panels appear/disappear instantly.
  panelAnimation:
    enterDurationMs: 420       # total expand duration (line -> full panel)
    exitDurationMs: 320        # total collapse duration (panel -> line -> gone)
    lineHoldMs: 120            # how long the line is visible before expanding
    lineBlinkCount: 2          # times the line blinks before expanding
    lineBlinkIntervalMs: 90    # blink interval (ms per opacity toggle)
    contentFadeInDelayMs: 180  # when sidebar content fades in (rel. to enter)
